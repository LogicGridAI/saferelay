name: SafeRelay Release Pipeline

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

jobs:
  # ── 1. PyPI ────────────────────────────────────────────────────────────────
  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Extract version from tag
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Bump version in setup.py and __main__.py
        run: |
          sed -i "s/version=\"[0-9.]*\"/version=\"$VERSION\"/" setup.py
          sed -i "s/__version__ = \"[0-9.]*\"/__version__ = \"$VERSION\"/" saferelay/__main__.py
          grep -n "version" setup.py saferelay/__main__.py | head -5

      - name: Install build
        run: pip install build

      - name: Build wheel and sdist
        run: python -m build

      - name: Verify build output
        run: |
          ls -la dist/
          test -n "$(ls dist/*.whl 2>/dev/null)"

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          if-no-files-found: error
          retention-days: 7

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  # ── 2. Docker ──────────────────────────────────────────────────────────────
  publish-docker:
    name: Publish to Docker Hub
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Bump version in setup.py and __main__.py
        run: |
          sed -i "s/version=\"[0-9.]*\"/version=\"$VERSION\"/" setup.py
          sed -i "s/__version__ = \"[0-9.]*\"/__version__ = \"$VERSION\"/" saferelay/__main__.py

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            logicgridai/saferelay:${{ env.VERSION }}
            logicgridai/saferelay:latest

  # ── 3. GitHub Release ──────────────────────────────────────────────────────
  publish-github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [publish-pypi, publish-docker]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Generate SHA256 checksums
        run: |
          ls -la dist/
          cd dist && sha256sum *.whl *.tar.gz > ../checksums.txt && cd ..
          cat checksums.txt
          test -s checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: SafeRelay v${{ env.VERSION }}
          body: |
            ## SafeRelay v${{ env.VERSION }}

            ### Distribution
            | Channel | Install |
            |---------|---------|
            | Chrome Web Store | [Install extension](https://chromewebstore.google.com/detail/odeoilooelkodahbbdokbollgahdcaag) |
            | Firefox AMO | [Install extension](https://addons.mozilla.org/en-US/firefox/addon/saferelay-dlp/) |
            | PyPI | `pip install saferelay==${{ env.VERSION }}` |
            | Docker | `docker pull logicgridai/saferelay:${{ env.VERSION }}` |
            | npm SDK | `npm install @logicgridai/saferelay-sdk` |

            ### Verify downloads
            ```
            sha256sum -c checksums.txt
            ```

            ### What's protected
            40+ threat patterns across 8+ countries — API keys, PII, crypto wallets, and more.
            → [Full changelog](https://saferelay.ai) · [Get a license](https://saferelay.ai/#pricing)
          files: |
            checksums.txt
            dist/*.whl
            dist/*.tar.gz
          generate_release_notes: true

  # ── 4. Release Summary ─────────────────────────────────────────────────────
  notify:
    name: Release Summary
    runs-on: ubuntu-latest
    needs: [publish-pypi, publish-docker, publish-github-release]
    if: always()
    steps:
      - name: Extract version from tag
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Print release summary
        run: |
          echo "================================"
          echo "SafeRelay v$VERSION Release Summary"
          echo "================================"
          echo "PyPI:    ${{ needs.publish-pypi.result }}"
          echo "Docker:  ${{ needs.publish-docker.result }}"
          echo "Release: ${{ needs.publish-github-release.result }}"
          echo "================================"
