
name: SafeRelay Release Pipeline

on:
  push:
    tags:
      - 'v*'
permissions:
  contents: write    # needed for GitHub Release creation
  id-token: write    # needed for PyPI OIDC (if used)
jobs:
  # ── 1. PyPI ────────────────────────────────────────────────────────────────
  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Extract version from tag
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV
      - name: Bump version in setup.py and __main__.py
        run: |
          sed -i "s/version=\"[0-9.]*\"/version=\"$VERSION\"/" setup.py
          sed -i "s/__version__ = \"[0-9.]*\"/__version__ = \"$VERSION\"/" saferelay/__main__.py
      - name: Install build
        run: pip install build
      - name: Build wheel
        run: python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_TOKEN }}

  # ── 2. Docker ─────────────────────────────────────────────────────────────
  publish-docker:
    name: Publish to Docker Hub
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Extract version from tag
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV
      - name: Bump version in setup.py and __main__.py
        run: |
          sed -i "s/version=\"[0-9.]*\"/version=\"$VERSION\"/" setup.py
          sed -i "s/__version__ = \"[0-9.]*\"/__version__ = \"$VERSION\"/" saferelay/__main__.py
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push multi-arch image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            logicgridai/saferelay:${{ env.VERSION }}
            logicgridai/saferelay:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 3. Chrome Extension ───────────────────────────────────────────────────
  publish-chrome:
    name: Chrome Web Store
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Extract version from tag
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV
      - name: Bump version in extension manifest and popup
        run: |
          jq --arg v "$VERSION" '.version = $v' extension/manifest.json > tmp.json && mv tmp.json extension/manifest.json
          sed -i "s/SafeRelay · v[0-9.]\+/SafeRelay · v$VERSION/" extension/popup.html
      - name: Build Chrome zip
        run: |
          cd extension
          zip -r ../saferelay-chrome-v${{ env.VERSION }}.zip . \
            --exclude "*.git*" --exclude "*.md" --exclude "*.zip" \
            --exclude "firefox_manifest.json"
      - name: Upload to Chrome Web Store
        uses: mnao305/chrome-extension-upload@v5.0.0
        with:
          file-path: saferelay-chrome-v${{ env.VERSION }}.zip
          extension-id: ${{ secrets.CHROME_EXTENSION_ID }}
          client-id: ${{ secrets.CHROME_CLIENT_ID }}
          client-secret: ${{ secrets.CHROME_CLIENT_SECRET }}
          refresh-token: ${{ secrets.CHROME_REFRESH_TOKEN }}
          publish: true
      - name: Upload Chrome zip as artifact
        uses: actions/upload-artifact@v4
        with:
          name: chrome-zip
          path: saferelay-chrome-v${{ env.VERSION }}.zip

  # ── 4. Firefox Extension ──────────────────────────────────────────────────
  publish-firefox:
    name: Firefox AMO
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Extract version from tag
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV
      - name: Patch manifest and popup for Firefox
        run: |
          jq --arg v "$VERSION" '
            .version = $v |
            .browser_specific_settings = {
              "gecko": {
                "id": "saferelay-dlp@logicgrid.ai",
                "strict_min_version": "109.0"
              }
            }
          ' extension/manifest.json > tmp.json && mv tmp.json extension/manifest.json
          sed -i "s/SafeRelay · v[0-9.]\+/SafeRelay · v$VERSION/" extension/popup.html
      - name: Install web-ext
        run: npm install -g web-ext
      - name: Build Firefox zip
        run: |
          web-ext build \
            --source-dir extension \
            --artifacts-dir . \
            --filename saferelay-firefox-v${{ env.VERSION }}.zip \
            --ignore-files "*.git*" "*.md" "*.zip" "firefox_manifest.json"
      - name: Sign & submit to AMO
        run: |
          web-ext sign \
            --source-dir extension \
            --artifacts-dir . \
            --channel listed \
            --api-key ${{ secrets.FIREFOX_API_KEY }} \
            --api-secret ${{ secrets.FIREFOX_API_SECRET }}
      - name: Upload Firefox zip as artifact
        uses: actions/upload-artifact@v4
        with:
          name: firefox-zip
          path: saferelay-firefox-v${{ env.VERSION }}.zip

  # ── 5. GitHub Release ─────────────────────────────────────────────────────
  publish-github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [publish-chrome, publish-firefox]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Extract version from tag
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV
      - name: Download Chrome zip
        uses: actions/download-artifact@v4
        with:
          name: chrome-zip
      - name: Download Firefox zip
        uses: actions/download-artifact@v4
        with:
          name: firefox-zip
      - name: Generate SHA256 checksums
        run: |
          sha256sum saferelay-chrome-v${{ env.VERSION }}.zip saferelay-firefox-v${{ env.VERSION }}.zip > checksums.txt 2>/dev/null || true
          find dist/ -name "*.whl" -exec sha256sum {} \; >> checksums.txt 2>/dev/null || true
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: SafeRelay Enterprise v${{ env.VERSION }}
          body: |
            ## SafeRelay Enterprise v${{ env.VERSION }}

            ### Distribution
            | Channel | Install |
            |---------|---------|
            | Chrome Web Store | [Install extension](https://saferelay.ai) |
            | Firefox AMO | [Install extension](https://saferelay.ai) |
            | PyPI | `pip install saferelay-enterprise==${{ env.VERSION }}` |
            | Docker | `docker pull logicgridai/saferelay:${{ env.VERSION }}` |
            | npm SDK | `npm install @logicgridai/saferelay-sdk` |

            ### What's protected
            35+ threat patterns across 8+ countries — API keys, PII, crypto wallets, and more.
            → [Full changelog](https://saferelay.ai) · [Get a license](https://saferelay.ai/#pricing)
          files: |
            saferelay-chrome-v${{ env.VERSION }}.zip
            saferelay-firefox-v${{ env.VERSION }}.zip
            checksums.txt
          generate_release_notes: true

  # ── 6. Release Summary ────────────────────────────────────────────────────
  notify:
    name: Release Summary
    runs-on: ubuntu-latest
    needs: [publish-pypi, publish-docker, publish-chrome, publish-firefox, publish-github-release]
    if: always()
    steps:
      - name: Extract version from tag
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV
      - name: Print release summary
        run: |
          echo "====[REDACTED_AWS_SECRET]"
          echo "SafeRelay v$VERSION Release Summary"
          echo "====[REDACTED_AWS_SECRET]"
          echo "PyPI:    ${{ needs.publish-pypi.result }}"
          echo "Docker:  ${{ needs.publish-docker.result }}"
          echo "Chrome:  ${{ needs.publish-chrome.result }}"
          echo "Firefox: ${{ needs.publish-firefox.result }}"
          echo "Release: ${{ needs.publish-github-release.result }}"
          echo "====[REDACTED_AWS_SECRET]"
